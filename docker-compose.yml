services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  supertokens-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: supertokens
      POSTGRES_PASSWORD: supertokens
      POSTGRES_DB: supertokens
    volumes:
      - supertokens-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supertokens"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql
    ports:
      - "3567:3567"
    environment:
      POSTGRESQL_USER: supertokens
      POSTGRESQL_PASSWORD: supertokens
      POSTGRESQL_HOST: supertokens-db
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE_NAME: supertokens
    depends_on:
      supertokens-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3567/hello"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/workflow?sslmode=disable"
      SUPERTOKENS_URL: "http://supertokens:3567"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy
      supertokens:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      - api

  pgweb:
    image: sosedoff/pgweb:latest
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: "postgres://postgres:postgres@db:5432/workflow?sslmode=disable"
    depends_on:
      - db

volumes:
  pgdata:
  supertokens-pgdata:
  go-mod-cache:
  pnpm-store:
